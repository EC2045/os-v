<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>文章ビルダー</title>
<link rel="stylesheet" href="style.css">
<script src="data.js"></script>
<script src="app.js"></script>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <h1>文章ビルダー</h1>
    <p>基本の語順に戻した、組み立て重視の画面です。</p>
  </header>

  <div class="nav">
    <a href="index.html">ホーム</a>
    <a href="builder.html" class="active">文章ビルダー</a>
    <a href="translator.html">翻訳ツール</a>
    <a href="dictionary.html">辞書</a>
    <a href="phrases.html">例文集</a>
    <a href="learning.html">学習ソフト</a>
    <a href="grammar.html">文法ガイド</a>
  </div>

  <div class="grid grid-2">
    <section class="card">
      <h2>文章構成（OVS形式）</h2>

      <div class="row tight" style="gap:18px;margin-bottom:14px">
        <label><input type="radio" name="sent-type" value="normal" checked onchange="updateBuilder()"> 平叙文</label>
        <label><input type="radio" name="sent-type" value="query" onchange="updateBuilder()"> 疑問文 (^?...^?)</label>
        <label><input type="radio" name="sent-type" value="excl" onchange="updateBuilder()"> 感嘆文 (^!...^!)</label>
        <label><input type="checkbox" id="is-neg" onchange="updateBuilder()"> 否定 (nlot)</label>
      </div>

      <div class="grid grid-3">
        <div>
          <label>目的語 (O)</label>
          <select id="b-obj" onchange="updateBuilder()"></select>
          <label style="display:block;margin-top:8px"><input type="checkbox" id="b-obj-p" onchange="updateBuilder()"> 複数形 (;)</label>
        </div>
        <div>
          <label>動詞 (V)</label>
          <select id="b-verb" onchange="updateBuilder()"></select>
          <div class="row tight" style="gap:6px;margin-top:10px">
            <button onclick="setBType('^S')" id="bt-S" class="b-tense primary">現 ^S</button>
            <button onclick="setBType('^P')" id="bt-P" class="b-tense">過 ^P</button>
            <button onclick="setBType('^C')" id="bt-C" class="b-tense">完 ^C</button>
            <button onclick="setBType('^F')" id="bt-F" class="b-tense">未 ^F</button>
          </div>
        </div>
        <div>
          <label>主語 (S)</label>
          <select id="b-sub" onchange="updateBuilder()"></select>
          <label style="display:block;margin-top:8px"><input type="checkbox" id="b-sub-p" onchange="updateBuilder()"> 複数形 (;)</label>
        </div>
      </div>

      <div class="sep"></div>
      <div id="builder-result" class="mutedbox lang big center" style="min-height:88px;display:flex;align-items:center;justify-content:center">---</div>
    </section>

    <aside class="card">
      <h3>使い方</h3>
      <div class="list">
        <div class="item"><strong>語順</strong><div class="muted">基本は <b>目的語 + 動詞 + 主語</b> です。</div></div>
        <div class="item"><strong>否定</strong><div class="muted">文頭に <span class="lang">nlot</span> を付けます。</div></div>
        <div class="item"><strong>疑問・感嘆</strong><div class="muted">文全体を <span class="lang">^?</span> / <span class="lang">^!</span> で囲みます。</div></div>
      </div>
    </aside>
  </div>

  <div class="footer">OS^v Language Suite</div>
</div>

<script>
let bTense = '^S';

function populateBuilder() {
  const objSelect = document.getElementById('b-obj');
  const verbSelect = document.getElementById('b-verb');
  const subSelect = document.getElementById('b-sub');

  const objects = (window.OSV.dictionaryData || []).filter(d => d.type === 'obj' || d.type === 'adj');
  const verbs = (window.OSV.dictionaryData || []).filter(d => d.type === 'verb');
  const subs = (window.OSV.dictionaryData || []).filter(d => d.type === 'sub');

  objSelect.innerHTML = objects.map(d => `<option value="${d.ln}">${d.ln} (${d.jp})</option>`).join('');
  verbSelect.innerHTML = verbs.map(d => `<option value="${d.ln}">${d.ln} (${d.jp})</option>`).join('');
  subSelect.innerHTML = subs.map(d => `<option value="${d.ln}">${d.ln} (${d.jp})</option>`).join('');

  objSelect.selectedIndex = 0;
  verbSelect.selectedIndex = Math.min(2, Math.max(0, verbs.length - 1));
  subSelect.selectedIndex = 0;
}

function setBType(t) {
  bTense = t;
  document.querySelectorAll('.b-tense').forEach(btn => {
    btn.classList.remove('primary');
  });
  const active = document.getElementById('bt-' + t.replace('^', ''));
  if (active) active.classList.add('primary');
  updateBuilder();
}

function updateBuilder() {
  const o = document.getElementById('b-obj').value;
  const v = document.getElementById('b-verb').value;
  const s = document.getElementById('b-sub').value;
  const isNeg = document.getElementById('is-neg').checked;
  const type = document.querySelector('input[name="sent-type"]:checked').value;
  const oPlural = document.getElementById('b-obj-p').checked;
  const sPlural = document.getElementById('b-sub-p').checked;

  let sentence = `${o}${oPlural ? ';' : ''} ${v}${bTense} ${s}${sPlural ? ';' : ''}`;

  if (isNeg) {
    sentence = 'nlot ' + sentence;
  }
  if (type === 'query') sentence = `^? ${sentence} ^?`;
  if (type === 'excl') sentence = `^! ${sentence} ^!`;

  document.getElementById('builder-result').textContent = sentence;
}

populateBuilder();
setBType('^S');
updateBuilder();
</script>
</body>
</html>
