<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>os^v語 生成</title>
  <meta name="description" content="os^v語の文法・辞書・例文・翻訳・学習・文生成をまとめた公式サイトです。">
  <link rel="stylesheet" href="style.css">
  
</head>
<body data-page="builder">
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <strong id="site-title">os^v語 公式ポータル</strong>
        <span id="site-subtitle">Object → Verb → Subject</span>
      </div>
      <nav class="nav" id="site-nav">
        <a href="index.html" data-page="index">ホーム</a>
        <a href="portal.html" data-page="portal">ポータル</a>
        <a href="dictionary.html" data-page="dictionary">辞書</a>
        <a href="grammar.html" data-page="grammar">文法</a>
        <a href="phrases.html" data-page="phrases">例文</a>
        <a href="translator.html" data-page="translator">翻訳</a>
        <a href="learning.html" data-page="learning">学習</a>
        <a href="builder.html" data-page="builder">生成</a>
      </nav>
    </header>

    
<section class="hero" style="padding-top:26px;">
  <h1>生成</h1>
  <p>単語を選んで os^v の文を組み立てる端末です。</p>
</section>

<div class="builder-grid">
  <section class="card">
    <div class="section-title"><h2>設定</h2></div>
    <div class="builder-controls">
      <div>
        <label for="builder-object">目的語</label>
        <select id="builder-object"></select>
      </div>
      <div>
        <label for="builder-verb">動詞</label>
        <select id="builder-verb"></select>
      </div>
      <div>
        <label for="builder-subject">主語</label>
        <select id="builder-subject"></select>
      </div>
      <div>
        <label for="builder-tense">時制</label>
        <select id="builder-tense">
          <option value="^S">現在 / ^S</option>
          <option value="^P">過去 / ^P</option>
          <option value="^F">未来 / ^F</option>
          <option value="^C">継続 / ^C</option>
        </select>
      </div>
      <div class="toggle-row">
        <label class="toggle"><input id="builder-neg" type="checkbox"> 否定 nlot</label>
        <label class="toggle"><input id="builder-q" type="checkbox"> 疑問 ^?</label>
      </div>
    </div>
  </section>
  <section class="card">
    <div class="section-title"><h2>出力</h2></div>
    <div id="builder-output" class="code-line" style="min-height:120px; display:flex; align-items:center;"></div>
    <p id="builder-ex" class="phrase-note" style="margin-top:12px;"></p>
    <div class="panel" style="margin-top:14px;">
      <strong>組み方</strong>
      <p>基本は「目的語 + 動詞^時制 + 主語」。疑問文では全体を <code>^?</code> で囲みます。</p>
    </div>
  </section>
</div>


    <footer class="footer">
      <div>© <span id="year"></span> os^v語 公式サイト</div>
      <div id="site-description"></div>
    </footer>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/EC2045/scripts/font.js"></script>
</body>
</html>
