<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>学習ソフト</title>
<link rel="stylesheet" href="style.css">
<script src="data.js"></script>
<script src="app.js"></script>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <h1>学習ソフト</h1>
    <p>「何を勉強するか」をカードで選ぶ形にしました。</p>
  </header>

  <div class="nav">
    <a href="index.html">ホーム</a>
    <a href="builder.html">文章ビルダー</a>
    <a href="translator.html">翻訳ツール</a>
    <a href="dictionary.html">辞書</a>
    <a href="phrases.html">例文集</a>
    <a href="learning.html" class="active">学習ソフト</a>
    <a href="grammar.html">文法ガイド</a>
  </div>

  <section class="card">
    <h2>何を勉強するか</h2>
    <div id="modeCards" class="grid grid-4"></div>
  </section>

  <div class="sep"></div>

  <div class="grid grid-2">
    <section class="card">
      <h2 id="practiceTitle">---</h2>
      <p id="practiceDesc" class="muted">---</p>
      <div class="grid grid-2">
        <div>
          <label>範囲</label>
          <select id="scope">
            <option value="all">全体</option>
            <option value="verb">動詞</option>
            <option value="obj">名詞・目的語</option>
            <option value="sub">代名詞・主語</option>
            <option value="adj">形容詞</option>
            <option value="adv">副詞</option>
          </select>
        </div>
        <div>
          <label>スコア</label>
          <div class="grid grid-2">
            <div class="kpi"><strong id="score">0</strong><span class="muted">正解</span></div>
            <div class="kpi"><strong id="streak">0</strong><span class="muted">連続</span></div>
          </div>
        </div>
      </div>
      <div class="sep"></div>
      <div class="btnrow">
        <button class="primary" id="next">次の問題</button>
        <button class="soft" id="show">答えを見る</button>
        <button id="reset">リセット</button>
      </div>
    </section>

    <section class="card">
      <h2>問題</h2>
      <div id="question" class="mutedbox big center" style="min-height:140px;display:flex;align-items:center;justify-content:center">---</div>
      <div class="sep"></div>
      <input id="answer" placeholder="答えを入力">
      <div id="choiceArea" class="btnrow" style="margin-top:12px"></div>
      <div class="btnrow" style="margin-top:12px">
        <button class="primary" id="check">チェック</button>
      </div>
      <div id="feedback" class="center big" style="margin-top:12px"></div>
    </section>
  </div>

  <div class="footer">OS^v Language Suite</div>
</div>

<script>
const modes = [
  { id: 'jp2osv', icon: '文', title: '日本語→OS^v語', desc: '日本語の単語を見て、OS^v語で答えます。', kind: 'input' },
  { id: 'osv2jp', icon: '↔', title: 'OS^v語→日本語', desc: 'OS^v語の単語を見て、日本語で答えます。', kind: 'input' },
  { id: 'mc-jp', icon: '◎', title: '日本語の単語を当てる', desc: '日本語の意味に合うOS^v語を選びます。', kind: 'choice' },
  { id: 'mc-osv', icon: '◉', title: 'OS^v語の単語を当てる', desc: 'OS^v語に対応する日本語を選びます。', kind: 'choice' }
];

let currentMode = 'jp2osv';
let current = null;
let score = 0;
let streak = 0;

const modeCards = document.getElementById('modeCards');
const question = document.getElementById('question');
const answer = document.getElementById('answer');
const choiceArea = document.getElementById('choiceArea');
const practiceTitle = document.getElementById('practiceTitle');
const practiceDesc = document.getElementById('practiceDesc');

function pool() {
  const scope = document.getElementById('scope').value;
  let arr = (window.OSV.dictionaryData || []).filter(x => x.type !== 'part' && x.type !== 'conj');
  if (scope !== 'all') arr = arr.filter(x => x.type === scope);
  return arr;
}

function renderModeCards() {
  modeCards.innerHTML = modes.map(m => `
    <button class="item mode-card ${m.id === currentMode ? 'active' : ''}" data-mode="${m.id}" style="text-align:left;min-height:155px">
      <div class="badge" style="margin-bottom:10px">${escapeHtml(m.icon)}</div>
      <div class="big" style="font-size:1.05rem;line-height:1.3">${escapeHtml(m.title)}</div>
      <div class="muted" style="margin-top:8px;line-height:1.5">${escapeHtml(m.desc)}</div>
    </button>
  `).join('');

  document.querySelectorAll('.mode-card').forEach(btn => {
    btn.onclick = () => {
      currentMode = btn.dataset.mode;
      renderModeCards();
      nextQuestion();
    };
  });
}

function activeMode() {
  return modes.find(m => m.id === currentMode);
}

function setFeedback(text, ok) {
  const fb = document.getElementById('feedback');
  fb.textContent = text;
  fb.style.color = ok === true ? '#16a34a' : ok === false ? '#dc2626' : '#0f172a';
}

function clearChoices() {
  choiceArea.innerHTML = '';
}

function finish(ok, correctText) {
  if (ok) {
    score++;
    streak++;
    setFeedback('正解！ 🎉', true);
  } else {
    streak = 0;
    setFeedback(`ちがいます。答えは ${correctText}`, false);
  }
  document.getElementById('score').textContent = score;
  document.getElementById('streak').textContent = streak;
}

function renderQuestion() {
  const mode = activeMode();
  practiceTitle.textContent = mode.title;
  practiceDesc.textContent = mode.desc;
  const arr = pool();
  if (!arr.length) {
    current = null;
    question.textContent = '出題できる単語がありません';
    clearChoices();
    return;
  }

  current = arr[Math.floor(Math.random() * arr.length)];
  answer.value = '';
  setFeedback('');
  clearChoices();

  if (currentMode === 'jp2osv') {
    question.innerHTML = `「${escapeHtml(current.jp)}」をOS^v語にしてください`;
  } else if (currentMode === 'osv2jp') {
    question.innerHTML = `<span class="lang">${escapeHtml(current.ln)}</span> を日本語にしてください`;
  } else if (currentMode === 'mc-jp') {
    question.innerHTML = `「${escapeHtml(current.jp)}」に対応するOS^v語は？`;
    const opts = makeQuizOptions(current.ln, arr.map(x => x.ln), 4);
    choiceArea.innerHTML = opts.map(v => `<button class="soft choice" data-v="${escapeHtml(v)}">${escapeHtml(v)}</button>`).join('');
    bindChoices(current.ln);
  } else if (currentMode === 'mc-osv') {
    question.innerHTML = `<span class="lang">${escapeHtml(current.ln)}</span> に対応する日本語は？`;
    const opts = makeQuizOptions(current.jp, arr.map(x => x.jp), 4);
    choiceArea.innerHTML = opts.map(v => `<button class="soft choice" data-v="${escapeHtml(v)}">${escapeHtml(v)}</button>`).join('');
    bindChoices(current.jp);
  }
}

function bindChoices(correct) {
  document.querySelectorAll('.choice').forEach(btn => {
    btn.onclick = () => {
      const val = btn.dataset.v;
      finish(val === correct, correct);
      if (val === correct) setTimeout(nextQuestion, 900);
    };
  });
}

function nextQuestion() {
  renderQuestion();
}

document.getElementById('next').onclick = nextQuestion;
document.getElementById('scope').onchange = nextQuestion;
document.getElementById('reset').onclick = () => {
  score = 0;
  streak = 0;
  document.getElementById('score').textContent = 0;
  document.getElementById('streak').textContent = 0;
  nextQuestion();
};
document.getElementById('show').onclick = () => {
  if (!current) return;
  const ans = currentMode === 'jp2osv' ? current.ln : currentMode === 'osv2jp' ? current.jp : (currentMode === 'mc-jp' ? current.ln : current.jp);
  setFeedback(`答え: ${ans}`);
};

document.getElementById('check').onclick = () => {
  if (!current) return;
  const val = answer.value.trim();
  const correct = currentMode === 'jp2osv' ? current.ln : currentMode === 'osv2jp' ? current.jp : '';
  if (!correct) return;
  finish(val === correct, correct);
  if (val === correct) setTimeout(nextQuestion, 900);
};

renderModeCards();
nextQuestion();
</script>
</body>
</html>
