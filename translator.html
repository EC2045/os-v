    <header class="topbar">
      <div class="brand">
        <strong id="site-title">os^v語 公式ポータル</strong>
        <span id="site-subtitle">Object → Verb → Subject</span>
      </div>
      <nav class="nav" id="site-nav">

<section class="hero" style="padding-top:26px;">
  <h1>翻訳</h1>
  <p>語彙を対応づけて os^v語へ近づける簡易翻訳装置です。必要に応じて文の並びを整えてください。</p>
</section>

<div class="grid-2">
  <section class="card">
    <div class="section-title"><h2>入力</h2></div>
    <label for="translate-mode">変換モード</label>
    <select id="translate-mode">
      <option value="basic">基本</option>
      <option value="template">テンプレート</option>
    </select>
    <div style="height:12px"></div>
    <label for="translate-input">日本語または語の断片</label>
    <textarea id="translate-input" placeholder="例: 猫を愛する私は"></textarea>
    <div style="height:12px"></div>
    <button id="translate-btn" class="btn primary" type="button">変換</button>
  </section>
  <section class="card">
    <div class="section-title"><h2>出力</h2></div>
    <div id="translate-output" class="code-line" style="min-height:240px; display:flex; align-items:center;">ここに変換結果が表示されます。</div>
    <p style="color:var(--muted); line-height:1.8; margin-top:14px;">
      単語が辞書にある場合は優先して置換されます。完全自動翻訳ではなく、文生成の補助として使う構成です。
    </p>
  </section>
</div>
